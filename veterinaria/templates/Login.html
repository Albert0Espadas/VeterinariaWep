{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Veterinaria</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
}

.login-container{
height:100vh;
background-image: url("{% static 'img/f55.jpg' %}");
background-size: cover;
background-position: left ;
}

form{
border:2px solid #e6e6e6;
border-radius:25px;
padding:20px;
background:white;
}

.login-form{
display:flex;
align-items:center;
justify-content:center;
background-image: url("{% static 'img/LoginF.jpeg' %}");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
border-top-left-radius:50px;
border-bottom-left-radius:50px;
}

.card-login{
width:350px;
border:none;
border-radius: 30px;
padding: 10px;
}

.btn-login{
background-color:#8f0f71;
color:white;
border:none;
}

.btn-login:hover{
background-color:#eb89e5;
}

.btn-register{
background-color:#551350;
color:rgb(255, 255, 255);
border:none;
}

.btn-register:hover{
background-color:#c915bd;
}

</style>

</head>

<body>

<div class="container-fluid login-container">

<div class="row h-100">

<!-- IMAGEN -->
<div class="col-md-6 login-image"></div>

<!-- FORMULARIO -->

<div class="col-md-6 login-form">

<div class="card card-login shadow">

<div class="card-body">

<h3 class="text-center mb-3">Inicio de sesión</h3>

<p class="text-center text-muted">
Sistema de gestión veterinaria
</p>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Usuario</label>

<input type="text" name="username" class="form-control" required>

</div>

<div class="mb-3">

<label>Contraseña</label>

<div class="input-group">
<input type="password" name="password" id="password" class="form-control" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
👁️
</button>
</div>

</div>

<button class="btn btn-login w-100">

Iniciar sesión

</button>

</form>

<div class="text-center mt-3">

<p class="text-muted">¿No tienes cuenta?</p>

<a href="{% url 'registro' %}" class="btn btn-outline-secondary btn-register w-100">
Registrarse
</a>

</div>
{% if error %}

<div class="alert alert-danger mt-3">

{{ error }}

</div>

{% endif %}

</div>

</div>

</div>

</div>

</div>

<!-- SCRIPT PARA MOSTRAR/OCULTAR CONTRASEÑA -->
<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>

</body>
</html>
