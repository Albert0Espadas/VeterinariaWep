{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Veterinaria AnaVet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>
body{
background:#f6f6fb;
color:#24153f;
}

.sidebar{
min-height:100vh;
background:linear-gradient(180deg, #ffffff 0%, #f7f1ff 100%);
border-right:1px solid #eee;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
margin:6px 10px;
border-radius:14px;
text-decoration:none;
color:#6a0dad;
font-weight:600;
transition:0.3s;
}

.sidebar a:hover{
background:#6a0dad;
color:white;
}

.sidebar .active{
background:#6a0dad;
color:white;
}

.logo{
font-weight:bold;
font-size:20px;
margin-left:15px;
margin-bottom:20px;
}

.content{
padding:30px;
}

.section-title{
padding:10px 20px 4px 20px;
font-size:12px;
font-weight:700;
text-transform:uppercase;
letter-spacing:0.08em;
color:#9d8db9;
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<div class="logo">
Veterinaria Aviles
<br>
<small class="text-muted">Sistema Veterinario</small>
</div>

<div class="section-title">Principal</div>
<a href="{% url 'dashboard' %}" class="{% if request.path == '/dashboard/' %}active{% endif %}">Dashboard</a>
<a href="{% url 'recepcion' %}" class="{% if request.path == '/recepcion/' %}active{% endif %}">Recepcion</a>
<a href="{% url 'pos' %}" class="{% if request.path == '/pos/' %}active{% endif %}">Punto de Venta</a>

<div class="section-title">Modulos</div>
<a href="#">Veterinaria Anavet</a>
<a href="#">Citas</a>

</div>

<div class="col-md-10 content">

<div class="d-flex justify-content-end mb-3">
Usuario: <strong>{{ request.user.username }}</strong>

<a href="{% url 'logout' %}" class="btn btn-sm btn-danger ms-2">
Cerrar sesion
</a>

</div>

{% block content %}
{% endblock %}

</div>

</div>

</div>

</body>
</html>
