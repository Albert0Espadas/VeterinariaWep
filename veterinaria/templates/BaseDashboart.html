{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Veterinaria Aviles </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>

body{
background:#f6f6fb;
}

.sidebar{
height:100vh;
background:white;
border-right:1px solid #eee;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
margin:6px 10px;
border-radius:10px;
text-decoration:none;
color:#6a0dad;
font-weight:500;
transition:0.3s;
}


.sidebar a:hover{
background:#6a0dad;
color:white;
}

.sidebar .active{
background:#6a0dad;
color:white;
}



.logo{
font-weight:bold;
font-size:20px;
margin-left:15px;
margin-bottom:20px;
}

.content{
padding:30px;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<div class="logo">
Veterinaria Aviles
<br>
<small class="text-muted">Sistema Veterinario</small>
</div>

<a href="{% url 'dashboard' %}" class="active">Dashboard</a>
<a href="#">Recepción</a>
<a href="#">Punto de Venta</a>
<a href="#">Consultas</a>
<a href="#">Citas</a>

</div>

<!-- CONTENIDO -->

<div class="col-md-10 content">

<div class="d-flex justify-content-end mb-3">

    Usuario: <strong>{{ request.user.username }}</strong>

    <a href="{% url 'logout' %}" class="btn btn-sm btn-danger ms-2">
        Cerrar sesión
    </a>

</div>

{% block content %}

{% endblock %}

</div>

</div>

</div>

</body>
</html>
