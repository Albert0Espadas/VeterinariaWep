{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

body{
height:100vh;
}

.login-container{
height:100vh;
background-image: url("{% static 'img/LoginF.jpeg' %}");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.btn-register{
background-color:#551350;
color:white;
border:none;
}

.btn-register:hover{
background-color:#c915bd;
}

</style>

<div class="container login-container d-flex align-items-center">

<div class="row justify-content-center w-100">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">Registro</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Usuario</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Confirmar contraseña</label>
<input type="password" name="password2" class="form-control" required>
</div>

<button class="btn btn-register w-100">
Registrarse
</button>

</form>

<div class="text-center mt-3">

<div class="text-center mt-3">

<a href="{% url 'login' %}" class="btn btn-outline-dark w-100">
Volver a Iniciar Sesión
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
